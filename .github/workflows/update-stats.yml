name: Update README Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update-all:
    name: Update README stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm install node-fetch@3

      - name: Ensure output directories exist
        run: |
          mkdir -p profile
          mkdir -p assets

      - name: Generate GitHub stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=hogan-tech&show_icons=true&theme=gruvbox
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=hogan-tech&layout=compact&langs_count=6&theme=gruvbox
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: hogan-tech
          output_path: profile/trophy.svg
          theme: kimbie_dark
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update WakaTime section
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

      - name: Generate latest LeetCode SVG
        run: node .github/scripts/update_leetcode.js

      - name: Commit and push all updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md profile/*.svg assets/leetcode.svg
          git commit -m "chore: update README stats" || echo "No changes to commit"
          git push